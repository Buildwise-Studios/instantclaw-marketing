<!doctype html>
<html>
  <head>
    <style>
      body {
        background: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      svg {
        width: 500px;
        height: 500px;
        overflow: visible;
      }

      path:nth-child(1) {
        transform-origin: 50% 50%;
        animation: scaleUp 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      path:nth-child(2) {
        transform-origin: 50% 50%;
        animation: slideInLeft 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s
          forwards;
        opacity: 0;
        transform: translateX(-100px) scale(0.9);
      }
      path:nth-child(3) {
        transform-origin: 50% 50%;
        animation: slideInDown 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s
          forwards;
        opacity: 0;
        transform: translateY(-100px) scale(0.9);
      }
      path:nth-child(4) {
        transform-origin: 50% 50%;
        animation: slideInRight 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.1s
          forwards;
        opacity: 0;
        transform: translateX(100px) scale(0.9);
      }

      @keyframes scaleUp {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes slideInLeft {
        0% {
          transform: translateX(-100px) scale(0.9);
          opacity: 0;
        }
        100% {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes slideInDown {
        0% {
          transform: translateY(-100px) scale(0.9);
          opacity: 0;
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes slideInRight {
        0% {
          transform: translateX(100px) scale(0.9);
          opacity: 0;
        }
        100% {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <object
      type="image/svg+xml"
      data="instantclaw-logo.svg"
      onload="
        const svgDoc = this.contentDocument;
        if (svgDoc) {
          const svgEl = svgDoc.querySelector('svg');
          if (svgEl) {
            const styleEl = svgDoc.createElementNS(
              'http://www.w3.org/2000/svg',
              'style',
            );
            styleEl.textContent = document.querySelector('style').textContent;
            svgEl.appendChild(styleEl);
          }
        }
      "
    ></object>
  </body>
</html>
